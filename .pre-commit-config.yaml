repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend Lint
        files: ^frontend/
        language: system
        entry: bash -lc 'cd frontend && npm run lint'
        pass_filenames: false
      - id: just-lint
        name: just lint
        entry: just lint
        language: system
        pass_filenames: false
