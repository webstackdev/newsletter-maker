services:
  django:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    environment:
      BOOTSTRAP_APP: "true"
      DATABASE_URL: postgresql://newsletter:newsletter@postgres:5432/newsletter_maker
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["gunicorn", "newsletter_maker.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2"]
    volumes:
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    environment:
      BOOTSTRAP_APP: "false"
      DATABASE_URL: postgresql://newsletter:newsletter@postgres:5432/newsletter_maker
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["celery", "-A", "newsletter_maker", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles

  celery-beat:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    env_file:
      - .env
    environment:
      BOOTSTRAP_APP: "false"
      DATABASE_URL: postgresql://newsletter:newsletter@postgres:5432/newsletter_maker
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["celery", "-A", "newsletter_maker", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: newsletter_maker
      POSTGRES_USER: newsletter
      POSTGRES_PASSWORD: newsletter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter -d newsletter_maker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  nginx:
    image: nginx:alpine
    depends_on:
      django:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  static_data: