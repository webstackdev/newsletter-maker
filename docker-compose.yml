x-app-common: &app-common
  image: newsletter-maker-app:dev
  pull_policy: never
  build:
    context: .
    dockerfile: docker/web/Dockerfile
  env_file:
    - .env
  volumes:
    - .:/app

x-shared-env: &shared-env
  DATABASE_URL: postgresql://newsletter:newsletter@postgres:5432/newsletter_maker
  REDIS_URL: redis://redis:6379/0
  QDRANT_URL: http://qdrant:6333

services:
  django:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "true"
      <<: *shared-env
    command: ["gunicorn", "newsletter_maker.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "2", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery-worker:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "false"
      <<: *shared-env
    command: ["watchmedo", "auto-restart", "--directory=.", "--pattern=*.py", "--recursive", "--", "celery", "-A", "newsletter_maker", "worker", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    <<: *app-common
    environment:
      BOOTSTRAP_APP: "false"
      <<: *shared-env
    command: ["watchmedo", "auto-restart", "--directory=.", "--pattern=*.py", "--recursive", "--", "celery", "-A", "newsletter_maker", "beat", "--loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: newsletter_maker
      POSTGRES_USER: newsletter
      POSTGRES_PASSWORD: newsletter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter -d newsletter_maker"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  nginx:
    image: nginx:alpine
    depends_on:
      django:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: ["sh", "-lc", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    env_file:
      - .env
    environment:
      NEWSLETTER_API_BASE_URL: http://nginx
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      nginx:
        condition: service_started
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  frontend_node_modules:
